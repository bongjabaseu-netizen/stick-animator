<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>졸라맨 캐릭터 엔진 v2</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #111827; color: #e5e7eb; display: flex; height: 100vh; overflow: hidden; }

  /* ── 왼쪽: 미리보기 ── */
  .preview {
    width: 50%; min-width: 0; max-width: 50%; display: flex; flex-direction: column;
    background: #0f172a; border-right: 2px solid #1e293b; overflow: hidden;
  }
  .preview-header {
    padding: 12px 20px; background: #1e293b;
    display: flex; align-items: center; justify-content: space-between;
  }
  .preview-header h1 { font-size: 18px; }
  .preview-header .badge { font-size: 11px; background: #6366f1; padding: 3px 10px; border-radius: 20px; }
  .canvas-wrap {
    flex: 1; display: flex; align-items: center; justify-content: center;
    position: relative; min-height: 0; overflow: hidden;
  }
  #mainCanvas { max-width: 100%; max-height: 100%; display: block; }
  .bg-selector {
    position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 6px;
  }
  .bg-btn {
    width: 28px; height: 28px; border-radius: 50%; border: 2px solid #333;
    cursor: pointer; transition: border-color 0.2s;
  }
  .bg-btn:hover, .bg-btn.active { border-color: #6366f1; }

  /* 애니메이션 바 */
  .anim-bar {
    padding: 10px; background: #1e293b; display: flex; gap: 6px;
    overflow-x: auto; flex-wrap: wrap; justify-content: center;
  }
  .anim-btn {
    padding: 5px 12px; border: 1px solid #374151; border-radius: 6px;
    background: transparent; color: #9ca3af; cursor: pointer; font-size: 12px;
    transition: all 0.2s; white-space: nowrap;
  }
  .anim-btn:hover { border-color: #6366f1; color: #c7d2fe; }
  .anim-btn.active { background: #6366f1; border-color: #6366f1; color: white; }

  /* JSON 출력 */
  .json-bar {
    padding: 8px 12px; background: #0c0f1a; font-family: monospace;
    font-size: 10px; color: #6366f1; overflow-x: auto; white-space: nowrap;
    cursor: pointer; border-top: 1px solid #1e293b;
  }
  .json-bar:hover { color: #a5b4fc; }

  /* ── 오른쪽: 옵션 ── */
  .options {
    width: 50%; min-width: 0; max-width: 50%; overflow-y: auto; padding: 0;
    background: #111827;
  }
  .opt-section {
    border-bottom: 1px solid #1e293b;
  }
  .opt-header {
    padding: 10px 16px; background: #1e293b; font-size: 13px;
    font-weight: 700; cursor: pointer; display: flex;
    align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 1;
  }
  .opt-header:hover { background: #263145; }
  .opt-header .arrow { transition: transform 0.2s; }
  .opt-header.closed .arrow { transform: rotate(-90deg); }
  .opt-body { padding: 10px 16px; }
  .opt-body.hidden { display: none; }

  /* 옵션 그리드 */
  .opt-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
  }
  .opt-item {
    padding: 8px 4px; border: 2px solid #1e293b; border-radius: 8px;
    text-align: center; cursor: pointer; transition: all 0.2s;
    font-size: 11px; background: #0f172a;
  }
  .opt-item:hover { border-color: #4f46e5; background: #1e1b4b; }
  .opt-item.active { border-color: #6366f1; background: #312e81; }
  .opt-item .icon { font-size: 22px; display: block; margin-bottom: 2px; }
  .opt-item .label { color: #9ca3af; }

  /* 색상 선택 */
  .color-grid {
    display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px;
  }
  .color-swatch {
    width: 100%; aspect-ratio: 1; border-radius: 8px; cursor: pointer;
    border: 2px solid transparent; transition: all 0.2s;
  }
  .color-swatch:hover { transform: scale(1.15); }
  .color-swatch.active { border-color: white; box-shadow: 0 0 8px #6366f1; }

  /* 슬라이더 */
  .slider-row {
    display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
  }
  .slider-row label { font-size: 12px; min-width: 70px; color: #9ca3af; }
  .slider-row input[type="range"] {
    flex: 1; accent-color: #6366f1; height: 4px;
  }
  .slider-row .val { font-size: 12px; min-width: 30px; text-align: right; color: #6366f1; }

  /* 내보내기 버튼 */
  .export-bar {
    padding: 10px 16px; background: #1e293b; display: flex; gap: 8px;
    position: sticky; bottom: 0; border-top: 1px solid #374151;
  }
  .export-btn {
    flex: 1; padding: 10px; border: none; border-radius: 8px;
    font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s;
  }
  .export-btn.primary { background: #6366f1; color: white; }
  .export-btn.primary:hover { background: #4f46e5; }
  .export-btn.secondary { background: #374151; color: #e5e7eb; }
  .export-btn.secondary:hover { background: #4b5563; }
</style>
</head>
<body>

<!-- ═══ 왼쪽: 미리보기 ═══ -->
<div class="preview">
  <div class="preview-header">
    <h1>🎭 졸라맨 엔진</h1>
    <span class="badge">v2.0</span>
  </div>
  <div class="canvas-wrap">
    <canvas id="mainCanvas" width="600" height="600"></canvas>
    <div class="bg-selector" id="bgSelector"></div>
  </div>
  <div class="anim-bar" id="animBar"></div>
  <div class="json-bar" id="jsonBar" onclick="copyJSON()" title="클릭하면 JSON 복사">{ ... }</div>
</div>

<!-- ═══ 오른쪽: 옵션 ═══ -->

<script>
// ═══════════════════════════════════════════════

const DATA = {

const COLORS = {

  hair: ['#222','#4a3728','#8B4513','#d4a574','#e8c170','#c0392b','#2980b9','#8e44ad','#27ae60','#ecf0f1','#95a5a6','#e74c3c'],

};

const BACKGROUNDS = [
  { id: 'dark', color: '#0f172a' },
  { id: 'light', color: '#f1f5f9' },
  { id: 'green', color: '#064e3b' },
  { id: 'blue', color: '#1e3a5f' },
  { id: 'sunset', color: '#7c2d12' },
  { id: 'purple', color: '#2e1065' },
  { id: 'gray', color: '#6b7280' },
  { id: 'white', color: '#ffffff' },
];

const ANIMS = [
  { id: 'idle', label: '🧍 가만히' },
  { id: 'walk', label: '🚶 걷기' },
  { id: 'run', label: '🏃 달리기' },
  { id: 'wave', label: '👋 손흔들기' },
  { id: 'jump', label: '⬆ 점프' },
  { id: 'nod', label: '😊 끄덕' },
  { id: 'shake', label: '😤 도리도리' },
  { id: 'talk', label: '💬 말하기' },
  { id: 'dance', label: '💃 춤추기' },
  { id: 'sit', label: '🪑 앉기' },
  { id: 'think', label: '🤔 생각' },
  { id: 'clap', label: '👏 박수' },
  { id: 'kick', label: '🦵 발차기' },
  { id: 'bow', label: '🙇 인사' },
  { id: 'spin', label: '🔄 회전' },
];

// ═══════════════════════════════════════════════
// 현재 상태
// ═══════════════════════════════════════════════
const state = {
  bodyType: 'normal',
  hair: 'cap',
  hairColor: '#666',
  hat: 'none',
  hatColor: '#2d3436',
  expression: 'normal',
  top: 'none',
  topColor: '#3498db',
  bottom: 'none',
  bottomColor: '#2d3436',
  accessory: 'none',
  face: 'none',
  skinColor: '#f0f0e8',
  outlineColor: '#222',
  bgColor: '#0f172a',
  anim: 'idle',
  scale: 1.0,
  headSize: 1.0,
};

let animTime = 0;

// ═══════════════════════════════════════════════
// UI 생성
// ═══════════════════════════════════════════════
function buildOptions() {
  const panel = document.getElementById('optionsPanel');
  const sections = [
    { key: 'bodyType', title: '🏋️ 체형', type: 'grid' },
    { key: 'skinColor', title: '🎨 피부색', type: 'colors', palette: 'skin' },
    { key: 'hair', title: '💇 머리카락', type: 'grid' },
    { key: 'hairColor', title: '🎨 머리 색상', type: 'colors', palette: 'hair' },
    { key: 'hat', title: '🎩 모자/머리장식', type: 'grid' },
    { key: 'expression', title: '😊 표정', type: 'grid' },
    { key: 'face', title: '🥸 얼굴 장식', type: 'grid' },
    { key: 'top', title: '👕 상의', type: 'grid' },
    { key: 'topColor', title: '🎨 상의 색상', type: 'colors', palette: 'outfit' },
    { key: 'bottom', title: '👖 하의', type: 'grid' },
    { key: 'bottomColor', title: '🎨 하의 색상', type: 'colors', palette: 'outfit' },
    { key: 'accessory', title: '🎒 악세서리', type: 'grid' },
    { key: 'sliders', title: '⚙️ 세부 조정', type: 'sliders' },
  ];

  let html = '';
  sections.forEach(sec => {
    html += `<div class="opt-section">
      <div class="opt-header" onclick="toggleSection(this)">
        ${sec.title} <span class="arrow">▼</span>
      </div>
      <div class="opt-body" id="sec_${sec.key}">`;

    if (sec.type === 'grid' && DATA[sec.key]) {
      html += `<div class="opt-grid">`;
      DATA[sec.key].forEach(item => {
        const active = state[sec.key] === item.id ? 'active' : '';
        html += `<div class="opt-item ${active}" data-key="${sec.key}" data-val="${item.id}" onclick="selectOpt(this,'${sec.key}','${item.id}')">
          <span class="icon">${item.icon}</span>
          <span class="label">${item.label}</span>
        </div>`;
      });
      html += `</div>`;
    } else if (sec.type === 'colors') {
      html += `<div class="color-grid">`;
      COLORS[sec.palette].forEach(c => {
        const active = state[sec.key] === c ? 'active' : '';
        html += `<div class="color-swatch ${active}" style="background:${c}" data-key="${sec.key}" data-val="${c}" onclick="selectColor(this,'${sec.key}','${c}')"></div>`;
      });
      html += `</div>`;
    } else if (sec.type === 'sliders') {
      html += `
        <div class="slider-row">
          <label>캐릭터 크기</label>
          <input type="range" min="0.5" max="2" step="0.1" value="${state.scale}" oninput="state.scale=parseFloat(this.value);this.nextElementSibling.textContent=this.value">
          <span class="val">${state.scale}</span>
        </div>
        <div class="slider-row">
          <label>머리 크기</label>
          <input type="range" min="0.6" max="1.8" step="0.1" value="${state.headSize}" oninput="state.headSize=parseFloat(this.value);this.nextElementSibling.textContent=this.value">
          <span class="val">${state.headSize}</span>
        </div>`;
    }

    html += `</div></div>`;
  });

  html += `<div class="export-bar">
    <button class="export-btn primary" onclick="exportPNG()">📥 PNG 저장</button>
    <button class="export-btn secondary" onclick="copyJSON()">📋 JSON 복사</button>
    <button class="export-btn secondary" onclick="randomize()">🎲 랜덤</button>
  </div>`;

  panel.innerHTML = html;
}

function toggleSection(el) {
  el.classList.toggle('closed');
  el.nextElementSibling.classList.toggle('hidden');
}

function selectOpt(el, key, val) {
  state[key] = val;
  el.parentElement.querySelectorAll('.opt-item').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  updateJSON();
}

function selectColor(el, key, val) {
  state[key] = val;
  el.parentElement.querySelectorAll('.color-swatch').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  updateJSON();
}

// 배경 선택 버튼
function buildBgSelector() {
  const wrap = document.getElementById('bgSelector');
  BACKGROUNDS.forEach(bg => {
    const btn = document.createElement('div');
    btn.className = 'bg-btn' + (state.bgColor === bg.color ? ' active' : '');
    btn.style.background = bg.color;
    btn.onclick = () => {
      state.bgColor = bg.color;
      wrap.querySelectorAll('.bg-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    };
    wrap.appendChild(btn);
  });
}

// 애니메이션 바
function buildAnimBar() {
  const bar = document.getElementById('animBar');
  ANIMS.forEach(a => {
    const btn = document.createElement('button');
    btn.className = 'anim-btn' + (state.anim === a.id ? ' active' : '');
    btn.textContent = a.label;
    btn.onclick = () => {
      state.anim = a.id;
      bar.querySelectorAll('.anim-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    };
    bar.appendChild(btn);
  });
}

// JSON 출력
function updateJSON() {
  const json = JSON.stringify(state);
  document.getElementById('jsonBar').textContent = json;
}

function copyJSON() {
  navigator.clipboard.writeText(JSON.stringify(state, null, 2));
  const bar = document.getElementById('jsonBar');
  const orig = bar.textContent;
  bar.textContent = '✅ JSON 복사됨!';
  setTimeout(() => bar.textContent = orig, 1500);
}

function exportPNG() {
  const canvas = document.getElementById('mainCanvas');
  const link = document.createElement('a');
  link.download = 'character.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function randomize() {
  const pick = arr => arr[Math.floor(Math.random() * arr.length)];
  state.bodyType = pick(DATA.bodyType).id;
  state.hair = pick(DATA.hair).id;
  state.hairColor = pick(COLORS.hair);
  state.hat = pick(DATA.hat).id;
  state.expression = pick(DATA.expression).id;
  state.top = pick(DATA.top).id;
  state.topColor = pick(COLORS.outfit);
  state.bottom = pick(DATA.bottom).id;
  state.bottomColor = pick(COLORS.outfit);
  state.accessory = pick(DATA.accessory).id;
  state.face = pick(DATA.face).id;
  state.skinColor = pick(COLORS.skin);
  buildOptions();
  updateJSON();
}

// ═══════════════════════════════════════════════
// 캐릭터 렌더링 엔진
// ═══════════════════════════════════════════════
const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');

function getBodyParams() {
  const base = { headR: 50, bodyW: 8, bodyH: 60, armLen: 40, legLen: 50, armW: 6, legW: 6, spread: 20 };
  switch (state.bodyType) {
    case 'thin': return { ...base, bodyW: 6, armW: 4, legW: 4 };
    case 'chubby': return { ...base, headR: 52, bodyW: 20, bodyH: 55, armW: 8, legW: 8, spread: 24 };
    case 'muscle': return { ...base, bodyW: 16, armW: 10, legW: 8, armLen: 42 };
    case 'kid': return { ...base, headR: 55, bodyW: 6, bodyH: 35, armLen: 25, legLen: 30, armW: 5, legW: 5, spread: 14 };
    case 'tall': return { ...base, bodyH: 75, legLen: 60, armLen: 48 };
    default: return base;
  }
}

function getAnimValues(anim, t) {
  const v = { headY: 0, bodyTilt: 0, lArm: 0, rArm: 0, lLeg: 0, rLeg: 0, bounce: 0, mouth: 0 };
  switch (anim) {
    case 'idle': v.bounce = Math.sin(t*3)*2; break;
    case 'walk':
      v.lLeg = Math.sin(t*8)*25; v.rLeg = Math.sin(t*8+Math.PI)*25;
      v.lArm = Math.sin(t*8+Math.PI)*20; v.rArm = Math.sin(t*8)*20;
      v.bounce = Math.abs(Math.sin(t*8))*4; break;
    case 'run':
      v.lLeg = Math.sin(t*14)*40; v.rLeg = Math.sin(t*14+Math.PI)*40;
      v.lArm = Math.sin(t*14+Math.PI)*35; v.rArm = Math.sin(t*14)*35;
      v.bounce = Math.abs(Math.sin(t*14))*8; v.bodyTilt = Math.sin(t*14)*3; break;
    case 'wave': v.rArm = -130+Math.sin(t*10)*30; v.bounce = Math.sin(t*3)*2; break;
    case 'jump':
      const jt=(t%2)/2; v.bounce=-Math.sin(jt*Math.PI)*80;
      v.lArm=-Math.sin(jt*Math.PI)*40; v.rArm=-Math.sin(jt*Math.PI)*40; break;
    case 'nod': v.headY=Math.sin(t*6)*8; break;
    case 'shake': v.bodyTilt=Math.sin(t*10)*10; break;
    case 'talk': v.mouth=Math.abs(Math.sin(t*12)); v.bounce=Math.sin(t*3); v.lArm=Math.sin(t*4)*10; v.rArm=Math.sin(t*4+1)*15; break;
    case 'dance':
      v.bounce=Math.abs(Math.sin(t*8))*12; v.bodyTilt=Math.sin(t*4)*8;
      v.lArm=Math.sin(t*6)*60; v.rArm=Math.sin(t*6+2)*60;
      v.lLeg=Math.sin(t*4)*15; v.rLeg=Math.sin(t*4+Math.PI)*15; break;
    case 'sit': v.lLeg=80; v.rLeg=80; v.bounce=20; break;
    case 'think': v.rArm=-100; v.headY=Math.sin(t*2)*3; v.bodyTilt=5; break;
    case 'clap':
      v.lArm=-60+Math.sin(t*12)*20; v.rArm=-60+Math.sin(t*12)*20;
      v.bounce=Math.abs(Math.sin(t*12))*3; break;
    case 'kick':
      v.rLeg=-40+Math.sin(t*6)*50; v.lArm=Math.sin(t*6)*15;
      v.bounce=Math.sin(t*6)*3; break;
    case 'bow':
      const bt=Math.sin(t*3)*0.5+0.5; v.bodyTilt=bt*30; v.headY=bt*10; break;
    case 'spin': v.bodyTilt=((t*120)%360); break;
  }
  return v;
}

function render() {
  animTime += 0.016;
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  // 배경
  ctx.fillStyle = state.bgColor;
  ctx.fillRect(0, 0, W, H);

  // 바닥 그리드
  const isLight = ['#f1f5f9','#ffffff','#6b7280'].includes(state.bgColor);
  ctx.strokeStyle = isLight ? '#00000010' : '#ffffff08';
  ctx.lineWidth = 1;
  for (let i = 0; i < W; i += 40) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,H); ctx.stroke(); }
  for (let i = 0; i < H; i += 40) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(W,i); ctx.stroke(); }

  const p = getBodyParams();
  const s = state.scale;
  const hs = state.headSize;
  const av = getAnimValues(state.anim, animTime);
  const oc = state.outlineColor;
  const cx = W / 2, cy = H * 0.55;

  ctx.save();
  ctx.translate(cx, cy + av.bounce * s);
  if (state.anim === 'spin') {
    // 회전은 특수 처리
    ctx.rotate(av.bodyTilt * Math.PI / 180);
  } else {
    ctx.rotate(av.bodyTilt * Math.PI / 180);
  }

  const headR = p.headR * s * hs;
  const bodyW = p.bodyW * s;
  const bodyH = p.bodyH * s;
  const armLen = p.armLen * s;
  const legLen = p.legLen * s;
  const armW = p.armW * s;
  const legW = p.legW * s;
  const spread = p.spread * s;

  const shoulderY = -bodyH/2;
  const hipY = bodyH/2;
  const headCY = -(bodyH + headR) + av.headY * s;

  // ── 그림자 ──
  ctx.fillStyle = 'rgba(0,0,0,0.12)';
  ctx.beginPath();
  ctx.ellipse(0, hipY+legLen+5*s, 35*s, 8*s, 0, 0, Math.PI*2);
  ctx.fill();

  // ── 다리 ──
  [[-1, av.lLeg], [1, av.rLeg]].forEach(([dir, angle]) => {
    ctx.save();
    ctx.translate(dir * spread/2, hipY);
    ctx.rotate(angle * Math.PI/180);
    ctx.strokeStyle = oc;
    ctx.lineWidth = legW;
    ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0, legLen); ctx.stroke();
    // 하의
    if (state.bottom !== 'none') {
      const bLen = state.bottom === 'shorts' ? legLen*0.4 : state.bottom === 'skirt' ? legLen*0.5 : legLen*0.85;
      ctx.strokeStyle = state.bottomColor;
      ctx.lineWidth = legW + 4*s;
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0, bLen); ctx.stroke();
    }
    // 발
    ctx.strokeStyle = oc;
    ctx.lineWidth = Math.max(3, legW*0.7);
    ctx.beginPath(); ctx.moveTo(-8*s, legLen); ctx.lineTo(10*s, legLen); ctx.stroke();
    ctx.restore();
  });

  // ── 치마 (하의=skirt) ──
  if (state.bottom === 'skirt') {
    ctx.beginPath();
    ctx.moveTo(-bodyW/2 - 2*s, hipY - 2*s);
    ctx.lineTo(-22*s, hipY + legLen*0.5);
    ctx.lineTo(22*s, hipY + legLen*0.5);
    ctx.lineTo(bodyW/2 + 2*s, hipY - 2*s);
    ctx.closePath();
    ctx.fillStyle = state.bottomColor;
    ctx.fill();
  }

  // ── 몸통 ──
  if (state.top === 'dress') {
    ctx.beginPath();
    ctx.moveTo(-bodyW/2 - 2*s, shoulderY);
    ctx.lineTo(-20*s, hipY+10*s);
    ctx.lineTo(20*s, hipY+10*s);
    ctx.lineTo(bodyW/2 + 2*s, shoulderY);
    ctx.closePath();
    ctx.fillStyle = state.topColor;
    ctx.fill();
    ctx.strokeStyle = oc; ctx.lineWidth = 2*s; ctx.stroke();
  } else {
    // 기본 막대 몸통
    ctx.strokeStyle = oc; ctx.lineWidth = bodyW; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(0, shoulderY); ctx.lineTo(0, hipY); ctx.stroke();
    // 상의
    if (state.top !== 'none') {
      const tw = state.top === 'hoodie' ? bodyW+10*s : state.top === 'suit' ? bodyW+6*s : state.top === 'armor' ? bodyW+14*s : bodyW+4*s;
      ctx.strokeStyle = state.topColor; ctx.lineWidth = tw;
      ctx.beginPath(); ctx.moveTo(0, shoulderY); ctx.lineTo(0, hipY - 5*s); ctx.stroke();
      // 상의 디테일
      if (state.top === 'suit') {
        ctx.strokeStyle = isLight ? '#00000020' : '#ffffff15'; ctx.lineWidth = 2*s;
        ctx.beginPath(); ctx.moveTo(0, shoulderY+5*s); ctx.lineTo(0, hipY-10*s); ctx.stroke();
      }
    }
  }

  // ── 팔 ──
  [[-1, av.lArm, -0.7, 0.7], [1, av.rArm, 0.7, 0.7]].forEach(([dir, angle, dx, dy]) => {
    ctx.save();
    ctx.translate(0, shoulderY + 5*s);
    ctx.rotate(angle * Math.PI/180);
    ctx.strokeStyle = oc; ctx.lineWidth = armW; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(dir*armLen*0.7, armLen*0.7); ctx.stroke();
    // 소매
    if (state.top !== 'none' && state.top !== 'dress') {
      ctx.strokeStyle = state.topColor; ctx.lineWidth = armW+3*s;
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(dir*armLen*0.3, armLen*0.3); ctx.stroke();
    }
    // 손
    ctx.beginPath();
    ctx.arc(dir*armLen*0.7, armLen*0.7, 5*s, 0, Math.PI*2);
    ctx.fillStyle = state.skinColor; ctx.fill();
    ctx.restore();
  });

  // ── 악세서리 (손에 드는 것) ──
  drawAccessory(ctx, state.accessory, armLen, shoulderY, s, av, oc);

  // ── 머리 ──
  ctx.save();
  ctx.translate(0, headCY);

  // 머리 원
  ctx.beginPath();
  ctx.arc(0, 0, headR, 0, Math.PI*2);
  ctx.fillStyle = state.skinColor;
  ctx.fill();
  ctx.strokeStyle = oc; ctx.lineWidth = 4*s; ctx.stroke();

  // ── 머리카락 ──
  drawHair(ctx, state.hair, headR, state.hairColor, oc, s);

  // ── 모자 ──
  drawHat(ctx, state.hat, headR, state.hatColor, oc, s);

  // ── 얼굴 ──
  // 눈
  const eyeY = -2*s;
  const eyeSpacing = headR * 0.26;

  if (state.expression === 'cool' || state.accessory === 'sunglasses') {
    // 선글라스
    ctx.fillStyle = '#222';
    ctx.beginPath(); ctx.roundRect(-eyeSpacing-10*s, eyeY-7*s, 20*s, 14*s, 3*s); ctx.fill();
    ctx.beginPath(); ctx.roundRect(eyeSpacing-10*s, eyeY-7*s, 20*s, 14*s, 3*s); ctx.fill();
    ctx.strokeStyle = '#222'; ctx.lineWidth = 2*s;
    ctx.beginPath(); ctx.moveTo(-eyeSpacing+10*s, eyeY); ctx.lineTo(eyeSpacing-10*s, eyeY); ctx.stroke();
  } else if (state.accessory === 'glasses') {
    ctx.strokeStyle = '#555'; ctx.lineWidth = 2.5*s;
    ctx.beginPath(); ctx.arc(-eyeSpacing, eyeY, 11*s, 0, Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.arc(eyeSpacing, eyeY, 11*s, 0, Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-eyeSpacing+11*s, eyeY); ctx.lineTo(eyeSpacing-11*s, eyeY); ctx.stroke();
    drawEyes(ctx, -eyeSpacing, eyeY, eyeSpacing, eyeY, 5*s, 8*s, oc, state.expression, s);
  } else {
    const ew = state.bodyType === 'kid' ? 8 : 5;
    const eh = state.bodyType === 'kid' ? 10 : 9;
    drawEyes(ctx, -eyeSpacing, eyeY, eyeSpacing, eyeY, ew*s, eh*s, oc, state.expression, s);
  }

  // 얼굴 장식
  drawFaceDecor(ctx, state.face, eyeY, headR, s, oc);

  // 입
  const mouthY = eyeY + headR * 0.4;
  drawMouth(ctx, 0, mouthY, state.expression, s, av.mouth, oc);

  // 표정 이펙트
  drawExprEffect(ctx, state.expression, headR, s, animTime);

  ctx.restore(); // head
  ctx.restore(); // main

  updateJSON();
  requestAnimationFrame(render);
}

// ── 눈 그리기 ──
function drawEyes(ctx, lx, ly, rx, ry, w, h, color, expr, s) {
  if (expr === 'sleep') {
    ctx.strokeStyle=color; ctx.lineWidth=2.5*s; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(lx-w,ly); ctx.lineTo(lx+w,ly); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(rx-w,ry); ctx.lineTo(rx+w,ry); ctx.stroke();
    return;
  }
  if (expr === 'happy') {
    ctx.strokeStyle=color; ctx.lineWidth=2.5*s; ctx.lineCap='round';
    ctx.beginPath(); ctx.arc(lx,ly+3*s,w,Math.PI+0.3,-0.3); ctx.stroke();
    ctx.beginPath(); ctx.arc(rx,ry+3*s,w,Math.PI+0.3,-0.3); ctx.stroke();
    return;
  }
  if (expr === 'wink') {
    ctx.fillStyle=color;
    ctx.beginPath(); ctx.ellipse(lx,ly,w,h,0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle=color; ctx.lineWidth=2.5*s;
    ctx.beginPath(); ctx.moveTo(rx-w,ry); ctx.lineTo(rx+w,ry); ctx.stroke();
    return;
  }
  if (expr === 'dizzy') {
    ctx.strokeStyle=color; ctx.lineWidth=2*s;
    ctx.beginPath(); ctx.moveTo(lx-w,ly-h); ctx.lineTo(lx+w,ly+h); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(lx+w,ly-h); ctx.lineTo(lx-w,ly+h); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(rx-w,ry-h); ctx.lineTo(rx+w,ry+h); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(rx+w,ry-h); ctx.lineTo(rx-w,ry+h); ctx.stroke();
    return;
  }
  if (expr === 'angry') {
    // 화난 눈썹
    ctx.strokeStyle=color; ctx.lineWidth=3*s; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(lx-w,ly-h-2*s); ctx.lineTo(lx+w,ly-h+4*s); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(rx+w,ry-h-2*s); ctx.lineTo(rx-w,ry-h+4*s); ctx.stroke();
  }
  if (expr === 'love') {
    ctx.fillStyle = '#e74c3c';
    [lx, rx].forEach(x => {
      ctx.beginPath();
      ctx.moveTo(x, ly+2*s);
      ctx.bezierCurveTo(x-w,ly-h, x-w*2,ly+2*s, x,ly+h);
      ctx.bezierCurveTo(x+w*2,ly+2*s, x+w,ly-h, x,ly+2*s);
      ctx.fill();
    });
    return;
  }
  if (expr === 'cry') {
    ctx.fillStyle=color;
    ctx.beginPath(); ctx.ellipse(lx,ly,w,h,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(rx,ry,w,h,0,0,Math.PI*2); ctx.fill();
    // 눈물
    ctx.fillStyle='#74b9ff';
    ctx.beginPath(); ctx.ellipse(lx+w,ly+h+4*s,2*s,6*s,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(rx-w,ry+h+4*s,2*s,6*s,0,0,Math.PI*2); ctx.fill();
    return;
  }

  // 기본
  ctx.fillStyle = color;
  ctx.beginPath(); ctx.ellipse(lx,ly,w,h,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(rx,ry,w,h,0,0,Math.PI*2); ctx.fill();
  // 하이라이트
  if (state.bodyType === 'kid') {
    ctx.fillStyle='white';
    ctx.beginPath(); ctx.arc(lx+2*s,ly-2*s,2.5*s,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(rx+2*s,ry-2*s,2.5*s,0,Math.PI*2); ctx.fill();
  }
}

// ── 입 그리기 ──
function drawMouth(ctx, x, y, expr, s, openAmt, color) {
  ctx.save(); ctx.translate(x, y);

  if (openAmt > 0.3) {
    ctx.fillStyle=color;
    ctx.beginPath(); ctx.ellipse(0,0,8*s,5*s*openAmt,0,0,Math.PI*2); ctx.fill();
    ctx.restore(); return;
  }

  ctx.strokeStyle=color; ctx.lineWidth=2.5*s; ctx.lineCap='round';

  switch(expr) {
    case 'happy': case 'love':
      ctx.beginPath(); ctx.arc(0,-4*s,10*s,0.3,Math.PI-0.3); ctx.stroke(); break;
    case 'sad': case 'cry':
      ctx.beginPath(); ctx.arc(0,8*s,8*s,Math.PI+0.3,-0.3); ctx.stroke(); break;
    case 'angry':
      ctx.fillStyle=color; ctx.fillRect(-10*s,-2*s,20*s,5*s);
      ctx.fillStyle='white';
      for(let i=0;i<4;i++) ctx.fillRect(-8*s+i*5*s,-1*s,3*s,3*s);
      break;
    case 'surprised':
      ctx.fillStyle=color; ctx.beginPath(); ctx.arc(0,0,6*s,0,Math.PI*2); ctx.fill(); break;
    case 'thinking':
      ctx.beginPath(); ctx.moveTo(-8*s,0); ctx.bezierCurveTo(-4*s,-4*s,4*s,4*s,8*s,0); ctx.stroke(); break;
    case 'dizzy':
      ctx.beginPath(); ctx.arc(0,3*s,6*s,0,Math.PI); ctx.stroke(); break;
    default:
      ctx.beginPath(); ctx.moveTo(-10*s,0); ctx.lineTo(10*s,0); ctx.stroke();
  }
  ctx.restore();
}

// ── 머리카락 그리기 ──
function drawHair(ctx, type, r, color, oc, s) {
  ctx.fillStyle = color;
  switch(type) {
    case 'cap':
      ctx.beginPath(); ctx.arc(0,0,r,Math.PI,0); ctx.fill();
      ctx.strokeStyle=oc; ctx.lineWidth=2*s;
      ctx.beginPath(); ctx.arc(0,0,r,Math.PI+0.3,-0.3); ctx.stroke();
      break;
    case 'short':
      ctx.beginPath(); ctx.arc(0,-3*s,r-2*s,Math.PI+0.4,-0.4); ctx.fill(); break;
    case 'long':
      ctx.beginPath(); ctx.arc(0,-5*s,r,Math.PI+0.2,-0.2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(-r+5*s,12*s,11*s,40*s,-0.1,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(r-5*s,12*s,11*s,40*s,0.1,0,Math.PI*2); ctx.fill();
      break;
    case 'spiky':
      for(let i=-3;i<=3;i++){
        const a=Math.PI+(i*0.3); const sx=Math.cos(a)*r*0.8; const sy=Math.sin(a)*r*0.8;
        ctx.beginPath(); ctx.moveTo(sx-7*s,sy); ctx.lineTo(sx,sy-18*s); ctx.lineTo(sx+7*s,sy); ctx.fill();
      } break;
    case 'bowl':
      ctx.beginPath(); ctx.arc(0,-5*s,r+2*s,Math.PI+0.1,-0.1); ctx.fill();
      ctx.fillRect(-r*0.8,-r*0.35,r*1.6,10*s); break;
    case 'curly':
      for(let i=-2;i<=2;i++){
        ctx.beginPath(); ctx.arc(i*r*0.35,-r*0.6,r*0.25,0,Math.PI*2); ctx.fill();
      }
      ctx.beginPath(); ctx.arc(-r*0.85,0,r*0.22,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(r*0.85,0,r*0.22,0,Math.PI*2); ctx.fill();
      break;
    case 'ponytail':
      ctx.beginPath(); ctx.arc(0,-5*s,r,Math.PI+0.3,-0.3); ctx.fill();
      ctx.beginPath(); ctx.ellipse(r*0.7,-r*0.2,8*s,35*s,0.3,0,Math.PI*2); ctx.fill();
      break;
    case 'mohawk':
      for(let i=-2;i<=2;i++){
        ctx.beginPath();
        ctx.moveTo(i*8*s-5*s,-r*0.5);
        ctx.lineTo(i*8*s,-r-15*s);
        ctx.lineTo(i*8*s+5*s,-r*0.5);
        ctx.fill();
      } break;
    case 'bald-side':
      ctx.beginPath(); ctx.arc(0,0,r,Math.PI+0.8,Math.PI+0.2,true); ctx.fill();
      ctx.beginPath(); ctx.arc(0,0,r,-0.2,-0.8,true); ctx.fill();
      break;
    case 'twintail':
      ctx.beginPath(); ctx.arc(0,-5*s,r,Math.PI+0.2,-0.2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(-r-3*s,-r*0.3,10*s,35*s,-0.15,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(r+3*s,-r*0.3,10*s,35*s,0.15,0,Math.PI*2); ctx.fill();
      break;
    case 'afro':
      ctx.beginPath(); ctx.arc(0,-5*s,r+15*s,0,Math.PI*2); ctx.fill(); break;
  }
}

// ── 모자 그리기 ──
function drawHat(ctx, type, r, color, oc, s) {
  switch(type) {
    case 'cap':
      ctx.fillStyle=color;
      ctx.beginPath(); ctx.arc(0,-r*0.2,r+2*s,Math.PI,0); ctx.fill();
      ctx.fillRect(-r*1.2,-r*0.2,r*0.8,6*s);
      break;
    case 'tophat':
      ctx.fillStyle=color;
      ctx.fillRect(-22*s,-r-32*s,44*s,32*s);
      ctx.fillRect(-32*s,-r-4*s,64*s,8*s);
      ctx.fillStyle='#e74c3c'; ctx.fillRect(-22*s,-r-12*s,44*s,5*s);
      break;
    case 'chef':
      ctx.fillStyle='#fff'; ctx.strokeStyle='#ddd'; ctx.lineWidth=2*s;
      ctx.beginPath(); ctx.ellipse(0,-r-12*s,28*s,18*s,0,0,Math.PI*2); ctx.fill(); ctx.stroke();
      ctx.beginPath(); ctx.ellipse(-14*s,-r-8*s,16*s,16*s,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(14*s,-r-8*s,16*s,16*s,0,0,Math.PI*2); ctx.fill();
      ctx.fillRect(-26*s,-r,52*s,7*s); ctx.strokeRect(-26*s,-r,52*s,7*s);
      break;
    case 'crown':
      ctx.fillStyle='#f1c40f'; ctx.strokeStyle='#e67e22'; ctx.lineWidth=2*s;
      ctx.beginPath();
      ctx.moveTo(-22*s,-r); ctx.lineTo(-22*s,-r-20*s); ctx.lineTo(-12*s,-r-10*s);
      ctx.lineTo(0,-r-25*s); ctx.lineTo(12*s,-r-10*s); ctx.lineTo(22*s,-r-20*s);
      ctx.lineTo(22*s,-r); ctx.closePath();
      ctx.fill(); ctx.stroke();
      ctx.fillStyle='#e74c3c';
      ctx.beginPath(); ctx.arc(0,-r-10*s,3*s,0,Math.PI*2); ctx.fill();
      break;
    case 'helmet':
      ctx.fillStyle=color; ctx.strokeStyle=oc; ctx.lineWidth=2*s;
      ctx.beginPath(); ctx.arc(0,-5*s,r+5*s,Math.PI,0); ctx.fill(); ctx.stroke();
      ctx.fillStyle='#ffffff30';
      ctx.beginPath(); ctx.arc(0,-5*s,r+5*s,Math.PI+0.3,Math.PI+1); ctx.fill();
      break;
    case 'beret':
      ctx.fillStyle=color;
      ctx.beginPath(); ctx.ellipse(-5*s,-r+2*s,r*0.8,12*s,-0.1,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(-r*0.3,-r-5*s,4*s,0,Math.PI*2); ctx.fill();
      break;
    case 'santa':
      ctx.fillStyle='#e74c3c';
      ctx.beginPath(); ctx.arc(0,-5*s,r+2*s,Math.PI,0); ctx.fill();
      ctx.beginPath(); ctx.moveTo(0,-r); ctx.quadraticCurveTo(r*0.5,-r-30*s,r+10*s,-r-5*s); ctx.lineTo(r,-r+5*s);
      ctx.fill();
      ctx.fillStyle='white';
      ctx.fillRect(-r-3*s,-r+2*s,r*2+6*s,8*s);
      ctx.beginPath(); ctx.arc(r+10*s,-r-5*s,6*s,0,Math.PI*2); ctx.fill();
      break;
    case 'wizard':
      ctx.fillStyle=color; ctx.strokeStyle=oc; ctx.lineWidth=2*s;
      ctx.beginPath();
      ctx.moveTo(-30*s,-r+2*s); ctx.lineTo(0,-r-45*s); ctx.lineTo(30*s,-r+2*s);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.fillStyle='#f1c40f';
      ctx.beginPath(); ctx.arc(0,-r-18*s,5*s,0,Math.PI*2); ctx.fill();
      ctx.fillRect(-30*s,-r+2*s,60*s,6*s);
      break;
    case 'ribbon':
      ctx.fillStyle='#ff4757';
      ctx.beginPath();
      ctx.moveTo(r*0.5,-r*0.6); ctx.lineTo(r*0.5+14*s,-r*0.6-10*s);
      ctx.lineTo(r*0.5+5*s,-r*0.6); ctx.lineTo(r*0.5+14*s,-r*0.6+10*s);
      ctx.closePath(); ctx.fill();
      break;
    case 'headband':
      ctx.strokeStyle='#e74c3c'; ctx.lineWidth=5*s;
      ctx.beginPath(); ctx.arc(0,0,r+2*s,Math.PI+0.5,-0.5); ctx.stroke();
      break;
    case 'halo':
      ctx.strokeStyle='#f1c40f'; ctx.lineWidth=3*s;
      ctx.beginPath(); ctx.ellipse(0,-r-10*s,20*s,6*s,0,0,Math.PI*2); ctx.stroke();
      break;
  }
}

// ── 얼굴 장식 ──
function drawFaceDecor(ctx, type, eyeY, r, s, oc) {
  switch(type) {
    case 'mustache':
      ctx.fillStyle='#555';
      ctx.beginPath(); ctx.ellipse(-8*s,eyeY+r*0.28,10*s,4*s,-0.2,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(8*s,eyeY+r*0.28,10*s,4*s,0.2,0,Math.PI*2); ctx.fill();
      break;
    case 'beard':
      ctx.fillStyle='#555';
      ctx.beginPath(); ctx.ellipse(0,r*0.55,15*s,18*s,0,0,Math.PI*2); ctx.fill();
      break;
    case 'blush':
      ctx.fillStyle='rgba(255,150,170,0.35)';
      ctx.beginPath(); ctx.ellipse(-r*0.5,eyeY+r*0.2,8*s,5*s,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(r*0.5,eyeY+r*0.2,8*s,5*s,0,0,Math.PI*2); ctx.fill();
      break;
    case 'freckles':
      ctx.fillStyle='#c0956e';
      [[-r*0.35,eyeY+r*0.15],[-r*0.25,eyeY+r*0.25],[-r*0.4,eyeY+r*0.28],
       [r*0.35,eyeY+r*0.15],[r*0.25,eyeY+r*0.25],[r*0.4,eyeY+r*0.28]].forEach(([x,y])=>{
        ctx.beginPath(); ctx.arc(x,y,2*s,0,Math.PI*2); ctx.fill();
      }); break;
    case 'scar':
      ctx.strokeStyle='#d4a'; ctx.lineWidth=2*s;
      ctx.beginPath(); ctx.moveTo(r*0.2,eyeY-r*0.3); ctx.lineTo(r*0.35,eyeY+r*0.1); ctx.stroke();
      break;
    case 'mask':
      ctx.fillStyle='#eee'; ctx.strokeStyle='#ccc'; ctx.lineWidth=1.5*s;
      ctx.beginPath();
      ctx.moveTo(-r*0.5,eyeY+r*0.15); ctx.quadraticCurveTo(0,eyeY+r*0.7,r*0.5,eyeY+r*0.15);
      ctx.lineTo(r*0.5,eyeY+r*0.45); ctx.quadraticCurveTo(0,eyeY+r*0.8,-r*0.5,eyeY+r*0.45);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      break;
    case 'bandaid':
      ctx.fillStyle='#f5d6ba'; ctx.strokeStyle='#d4a'; ctx.lineWidth=1*s;
      ctx.save(); ctx.translate(r*0.3,eyeY-r*0.1); ctx.rotate(0.3);
      ctx.beginPath(); ctx.roundRect(-10*s,-4*s,20*s,8*s,2*s); ctx.fill(); ctx.stroke();
      ctx.restore();
      break;
  }
}

// ── 표정 이펙트 ──
function drawExprEffect(ctx, expr, r, s, t) {
  if (expr === 'love') {
    ctx.fillStyle='#e74c3c';
    const hy=-r-15*s+Math.sin(t*3)*5*s;
    ctx.font=`${16*s}px serif`;
    ctx.textAlign='center';
    ctx.fillText('♥',r*0.6,hy);
    ctx.fillText('♥',-r*0.6,hy-5*s);
  }
  if (expr === 'thinking') {
    ctx.fillStyle='#ffffff80';
    ctx.beginPath(); ctx.arc(r+10*s,-r-5*s,4*s,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(r+18*s,-r-15*s,6*s,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(r+28*s,-r-28*s,8*s,0,Math.PI*2); ctx.fill();
  }
  if (expr === 'sleep') {
    ctx.fillStyle='#9ca3af';
    ctx.font=`bold ${10*s}px serif`;
    ctx.textAlign='left';
    const zy=-r-5*s+Math.sin(t*2)*8*s;
    ctx.globalAlpha=0.7; ctx.fillText('Z',r+5*s,zy);
    ctx.font=`bold ${14*s}px serif`; ctx.fillText('Z',r+15*s,zy-12*s);
    ctx.font=`bold ${18*s}px serif`; ctx.fillText('Z',r+25*s,zy-28*s);
    ctx.globalAlpha=1;
  }
}

// ── 악세서리 그리기 ──
function drawAccessory(ctx, type, armLen, shoulderY, s, av, oc) {
  const handX = armLen*0.7;
  const handY = shoulderY + 5*s + armLen*0.7;
  switch(type) {
    case 'sword':
      ctx.save(); ctx.translate(handX, handY);
      ctx.rotate(av.rArm*Math.PI/180*0.3);
      ctx.strokeStyle='#bbb'; ctx.lineWidth=3*s;
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,-40*s); ctx.stroke();
      ctx.strokeStyle='#8B4513'; ctx.lineWidth=6*s;
      ctx.beginPath(); ctx.moveTo(-6*s,-2*s); ctx.lineTo(6*s,-2*s); ctx.stroke();
      ctx.restore(); break;
    case 'shield':
      ctx.save(); ctx.translate(-handX-5*s, handY-5*s);
      ctx.fillStyle='#8B4513'; ctx.strokeStyle='#666'; ctx.lineWidth=2*s;
      ctx.beginPath();
      ctx.moveTo(0,-15*s); ctx.lineTo(15*s,-5*s); ctx.lineTo(15*s,10*s);
      ctx.lineTo(0,20*s); ctx.lineTo(-15*s,10*s); ctx.lineTo(-15*s,-5*s);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.fillStyle='#c0392b'; ctx.beginPath(); ctx.arc(0,3*s,6*s,0,Math.PI*2); ctx.fill();
      ctx.restore(); break;
    case 'book':
      ctx.save(); ctx.translate(-handX, handY);
      ctx.fillStyle='#3498db'; ctx.fillRect(-10*s,-8*s,20*s,16*s);
      ctx.fillStyle='#fff'; ctx.fillRect(-8*s,-6*s,16*s,12*s);
      ctx.restore(); break;
    case 'wand':
      ctx.save(); ctx.translate(handX, handY);
      ctx.strokeStyle='#8B4513'; ctx.lineWidth=3*s;
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(5*s,-35*s); ctx.stroke();
      ctx.fillStyle='#f1c40f';
      ctx.font=`${12*s}px serif`; ctx.fillText('✦',0,-38*s);
      ctx.restore(); break;
    case 'guitar':
      ctx.save(); ctx.translate(0, shoulderY+20*s);
      ctx.fillStyle='#8B4513';
      ctx.beginPath(); ctx.ellipse(0,20*s,12*s,16*s,0,0,Math.PI*2); ctx.fill();
      ctx.fillRect(-2*s,-10*s,4*s,30*s);
      ctx.restore(); break;
    case 'mic':
      ctx.save(); ctx.translate(handX, handY);
      ctx.strokeStyle='#555'; ctx.lineWidth=3*s;
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,-20*s); ctx.stroke();
      ctx.fillStyle='#888';
      ctx.beginPath(); ctx.arc(0,-23*s,6*s,0,Math.PI*2); ctx.fill();
      ctx.restore(); break;
    case 'balloon':
      ctx.save(); ctx.translate(handX, handY);
      ctx.strokeStyle='#ccc'; ctx.lineWidth=1*s;
      ctx.beginPath(); ctx.moveTo(0,0); ctx.quadraticCurveTo(5*s,-30*s,0,-50*s); ctx.stroke();
      ctx.fillStyle='#e74c3c';
      ctx.beginPath(); ctx.ellipse(0,-62*s,12*s,15*s,0,0,Math.PI*2); ctx.fill();
      ctx.restore(); break;
    case 'umbrella':
      ctx.save(); ctx.translate(handX, handY);
      ctx.strokeStyle='#555'; ctx.lineWidth=3*s;
      ctx.beginPath(); ctx.moveTo(0,5*s); ctx.lineTo(0,-35*s); ctx.stroke();
      ctx.fillStyle='#e74c3c';
      ctx.beginPath(); ctx.arc(0,-35*s,20*s,Math.PI,0); ctx.fill();
      ctx.restore(); break;
    case 'cane':
      ctx.save(); ctx.translate(handX+5*s, handY);
      ctx.strokeStyle='#8B4513'; ctx.lineWidth=4*s; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,40*s); ctx.stroke();
      ctx.beginPath(); ctx.arc(0,0,6*s,0,Math.PI); ctx.stroke();
      ctx.restore(); break;
    case 'phone':
      ctx.save(); ctx.translate(handX, handY-5*s);
      ctx.fillStyle='#333'; ctx.beginPath(); ctx.roundRect(-6*s,-10*s,12*s,18*s,2*s); ctx.fill();
      ctx.fillStyle='#4a90d9'; ctx.fillRect(-4*s,-7*s,8*s,12*s);
      ctx.restore(); break;
    case 'flag':
      ctx.save(); ctx.translate(handX, handY);
      ctx.strokeStyle='#888'; ctx.lineWidth=2*s;
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,-40*s); ctx.stroke();
      ctx.fillStyle='#e74c3c';
      ctx.fillRect(1*s,-40*s,20*s,14*s);
      ctx.restore(); break;
    case 'flower':
      ctx.save(); ctx.translate(handX, handY);
      ctx.strokeStyle='#2ecc71'; ctx.lineWidth=2*s;
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,-20*s); ctx.stroke();
      ctx.fillStyle='#ff6b8a';
      for(let i=0;i<5;i++){
        const a=i*Math.PI*2/5-Math.PI/2;
        ctx.beginPath(); ctx.arc(Math.cos(a)*6*s,-20*s+Math.sin(a)*6*s,4*s,0,Math.PI*2); ctx.fill();
      }
      ctx.fillStyle='#f1c40f'; ctx.beginPath(); ctx.arc(0,-20*s,3*s,0,Math.PI*2); ctx.fill();
      ctx.restore(); break;
    case 'bag':
      ctx.save(); ctx.translate(-15*s, shoulderY+10*s);
      ctx.fillStyle='#8B4513'; ctx.strokeStyle='#654321'; ctx.lineWidth=1.5*s;
      ctx.beginPath(); ctx.roundRect(-10*s,0,20*s,25*s,3*s); ctx.fill(); ctx.stroke();
      ctx.strokeStyle='#654321'; ctx.lineWidth=2*s;
      ctx.beginPath(); ctx.arc(0,-3*s,8*s,Math.PI,0); ctx.stroke();
      ctx.restore(); break;
  }
}

buildOptions();
buildBgSelector();
buildAnimBar();
updateJSON();
render();
</script>
